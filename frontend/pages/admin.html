<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CIEDE | Painel Administrativo</title>
  <link rel="icon" type="image/png" href="../img/logo1.png">
  <link rel="stylesheet" href="../css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>

<body class="admin-dashboard">

  <aside class="sidebar">
    <div class="sidebar-header">
      <img src="../img/logo1.png" alt="Logo CIEDE" class="logo-admin">
      <h2>CIEDE</h2>
      <p>Gestão Institucional</p>
    </div>
    
    <nav class="sidebar-nav">
      <a href="#" class="nav-item active">Mensagens</a>
      <a href="#" class="nav-item disabled" title="Em breve">Eventos (Breve)</a>
      <a href="#" class="nav-item disabled" title="Em breve">Revista (Breve)</a>
    </nav>

    <div class="sidebar-footer">
      <button onclick="logout()" class="btn-logout">Sair do Sistema</button>
    </div>
  </aside>

  <main class="main-content">
    
    <header class="top-header">
      <h1>Caixa de Entrada</h1>
      <span class="user-badge">Admin</span>
    </header>

    <div class="kpi-container">
      <div class="kpi-card">
        <h3>Total de Mensagens</h3>
        <p class="kpi-number" id="total-mensagens">0</p>
      </div>
      <div class="kpi-card">
        <h3>Status do Servidor</h3>
        <p class="kpi-status online">Online e Seguro</p>
      </div>
    </div>

    <div class="table-card">
      <div class="table-header">
        <h2>Mensagens Recebidas</h2>
      </div>
      <div class="table-responsive">
        <table class="tabela-premium">
          <thead>
            <tr>
              <th>Nome</th>
              <th>Email</th>
              <th>Mensagem</th>
              <th>Data</th>
              <th style="text-align: right;">Ações</th>
            </tr>
          </thead>
          <tbody id="tabela-mensagens">
            </tbody>
        </table>
      </div>
    </div>

  </main>

<script>
  const API = "https://projeto-ciede.onrender.com";

  // 🔐 proteção de acesso
  function verificarAuth() {
    const token = localStorage.getItem("token");
    if (!token) {
      window.location.href = "/pages/login.html";
    }
  }

  function getHeaders() {
    const token = localStorage.getItem("token");
    return {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + token
    };
  }

  async function carregarMensagens() {
  try {
    const res = await fetch(`${API}/mensagens`, {
      headers: getHeaders()
    });

    if (res.status === 401 || res.status === 403) {
      alert("Sessão expirada. Faça login novamente.");
      logout();
      return;
    }

    if (!res.ok) {
      throw new Error(`Erro no servidor. Status: ${res.status}`);
    }

    const data = await res.json();

    if (!Array.isArray(data)) {
      throw new Error("Os dados recebidos não estão no formato de lista (array).");
    }

    const tabela = document.getElementById("tabela-mensagens");
    const kpiTotal = document.getElementById("total-mensagens");

    // Atualiza o Card de Total de Mensagens dinamicamente
    kpiTotal.innerText = data.length;

    if (data.length === 0) {
      tabela.innerHTML = `
        <tr>
          <td colspan="5" style="text-align: center; padding: 30px; color: #888;">Nenhuma mensagem recebida ainda.</td>
        </tr>
      `;
      return;
    }

    const linhasHTML = data.map(msg => {
      const dataFormatada = msg.data
        ? new Date(msg.data).toLocaleDateString('pt-BR')
        : "Sem data";

      return `
        <tr>
          <td class="fw-500">${msg.nome}</td>
          <td><a href="mailto:${msg.email}" class="link-email">${msg.email}</a></td>
          <td class="td-mensagem">${msg.mensagem}</td>
          <td class="td-data">${dataFormatada}</td>
          <td style="text-align: right;">
            <button class="btn-excluir" onclick="excluir(${msg.id})">Excluir</button>
          </td>
        </tr>
      `;
    }).join(''); 

    tabela.innerHTML = linhasHTML;

  } catch (err) {
    console.error("Erro na função carregarMensagens:", err);
    alert("Erro ao carregar as mensagens. Verifique o console do navegador.");
  }
}

  async function excluir(id) {
    if (!confirm("Tem certeza que deseja excluir esta mensagem? Esta ação não pode ser desfeita.")) return;

    try {
      await fetch(`${API}/mensagens/${id}`, {
        method: "DELETE",
        headers: getHeaders()
      });

      carregarMensagens();

    } catch (err) {
      console.error(err);
      alert("Erro ao excluir");
    }
  }

  function logout() {
    localStorage.removeItem("token");
    window.location.href = "/pages/login.html";
  }

  // 🚀 inicialização
  verificarAuth();
  carregarMensagens();
</script>

</body>
</html>
