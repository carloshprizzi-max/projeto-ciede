<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Painel - Mensagens</title>
  <link rel="icon" type="image/png" href="../img/logo1.png">
  <link rel="stylesheet" href="../css/style.css">
</head>

<body>

  <div class="container">

    <h1>Painel de Mensagens</h1>

    <button onclick="logout()">Sair</button>

    <table class="tabela">
      <thead>
        <tr>
          <th>Nome</th>
          <th>Email</th>
          <th>Mensagem</th>
          <th>Data</th>
          <th>Ações</th>
        </tr>
      </thead>

      <tbody id="tabela-mensagens"></tbody>
    </table>

  </div>

<script>
  const API = "https://projeto-ciede.onrender.com";

  // 🔐 proteção de acesso
  function verificarAuth() {
    const token = localStorage.getItem("token");

    if (!token) {
      window.location.href = "/pages/login.html";
    }
  }

  function getHeaders() {
    const token = localStorage.getItem("token");

    return {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + token
    };
  }

  async function carregarMensagens() {
    try {
      const res = await fetch(`${API}/mensagens`, {
        headers: getHeaders()
      });

      console.log("STATUS:", res.status);

      if (res.status === 401 || res.status === 403) {
        alert("Sessão expirada");
        logout();
        return;
      }

      const data = await res.json();

      const tabela = document.getElementById("tabela-mensagens");
      tabela.innerHTML = "";

      data.forEach(msg => {
        const dataFormatada = msg.data
          ? new Date(msg.data).toLocaleDateString('pt-BR')
          : "Sem data";

        tabela.innerHTML += `
          <tr>
            <td>${msg.nome}</td>
            <td>${msg.email}</td>
            <td>${msg.mensagem}</td>
            <td>${dataFormatada}</td>
            <td>
              <button onclick="excluir(${msg.id})">Excluir</button>
            </td>
          </tr>
        `;
      });

    } catch (err) {
      console.error(err);
      alert("Erro ao carregar mensagens");
    }
  }

  async function excluir(id) {
    if (!confirm("Deseja excluir esta mensagem?")) return;

    try {
      await fetch(`${API}/mensagens/${id}`, {
        method: "DELETE",
        headers: getHeaders()
      });

      carregarMensagens();

    } catch (err) {
      console.error(err);
      alert("Erro ao excluir");
    }
  }

  function logout() {
    localStorage.removeItem("token");
    window.location.href = "/pages/login.html";
  }

  // 🚀 inicialização
  verificarAuth();
  carregarMensagens();
</script>

</body>
</html>
